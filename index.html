<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Agendamentos</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0D1117;
            color: #E6EDF3;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0D1117 0%, #1A1F2B 100%);
            position: relative;
        }

        .login-box {
            background: #1C2128;
            padding: 30px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #30363D;
            margin: 20px;
        }

        .login-box h1 {
            color: #D4AF37;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            background: #C4A030;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #8B949E;
            border: 1px solid #30363D;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab.active {
            background: #D4AF37;
            color: #0D1117;
            border-color: #D4AF37;
        }

        .admin-screen {
            display: none;
            min-height: 100vh;
            padding: 15px;
        }

        .admin-screen.active {
            display: block;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-topbar {
            background: #1C2128;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363D;
            gap: 15px;
        }

        .admin-topbar h1 {
            color: #D4AF37;
            font-size: 20px;
        }

        .admin-topbar button {
            padding: 10px 20px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-topbar button:hover {
            background: #C4A030;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1C2128;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363D;
        }

        .stat-card i {
            font-size: 24px;
            color: #D4AF37;
            margin-bottom: 8px;
        }

        .stat-card .label {
            color: #8B949E;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-card {
            background: #1C2128;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363D;
        }

        .sidebar-card h3 {
            color: #D4AF37;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .day-toggle {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .day-btn {
            padding: 8px 3px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 6px;
            color: #8B949E;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            transition: all 0.3s;
        }

        .day-btn.active {
            background: #238636;
            color: white;
            border-color: #238636;
        }

        .limit-input {
            display: flex;
            gap: 10px;
        }

        .limit-input input {
            flex: 1;
            padding: 10px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 8px;
            color: white;
        }

        .limit-input button {
            padding: 10px 15px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .services-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .service-item {
            background: #0D1117;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #30363D;
        }

        .service-item input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #1C2128;
            border: 1px solid #30363D;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .service-actions {
            display: flex;
            gap: 8px;
        }

        .service-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-save {
            background: #D4AF37;
            color: #0D1117;
        }

        .btn-save:hover {
            background: #C4A030;
        }

        .btn-toggle {
            background: #238636;
            color: white;
        }

        .btn-toggle.inactive {
            background: #6E7681;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: #2EA043;
        }

        .content-area {
            background: #1C2128;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363D;
        }

        .content-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .content-header h2 {
            color: #D4AF37;
            font-size: 18px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 12px;
            background: #0D1117;
            color: #8B949E;
            border: 1px solid #30363D;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #D4AF37;
            color: #0D1117;
            border-color: #D4AF37;
        }

        .appointments-table {
            width: 100%;
        }

        .appointment-row {
            background: #0D1117;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #30363D;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .appointment-row {
                grid-template-columns: 120px 1fr auto;
            }
        }

        .appointment-row:hover {
            border-color: #D4AF37;
            background: #161B22;
        }

        .appointment-time {
            text-align: center;
        }

        .appointment-date {
            font-size: 13px;
            color: #8B949E;
            margin-bottom: 5px;
        }

        .appointment-hour {
            font-size: 20px;
            font-weight: bold;
            color: #D4AF37;
        }

        .appointment-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .appointment-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .info-item i {
            color: #D4AF37;
            width: 18px;
        }

        .appointment-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-view {
            padding: 8px 15px;
            background: #1C2128;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #D4AF37;
            color: #0D1117;
        }

        .btn-delete {
            padding: 8px 15px;
            background: #DA3633;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #F85149;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }

        .status-confirmed {
            background: #238636;
            color: white;
        }

        .status-cancelled {
            background: #DA3633;
            color: white;
        }

        .status-pending {
            background: #D4AF37;
            color: #0D1117;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8B949E;
        }

        .empty-state i {
            font-size: 40px;
            color: #30363D;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1C2128;
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #30363D;
        }

        .modal-content h3 {
            color: #D4AF37;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal-detail {
            margin-bottom: 12px;
            padding: 10px;
            background: #0D1117;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1C2128;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            border-left: 4px solid #D4AF37;
            z-index: 2000;
            animation: slideUp 0.3s;
            font-size: 14px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }

        .error-message {
            color: #F85149;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            display: none;
        }

        .link-button {
            background: none;
            border: none;
            color: #D4AF37;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            width: 100%;
            font-size: 14px;
            transition: color 0.3s;
        }

        .link-button:hover {
            color: #C4A030;
        }

        .info-text {
            text-align: center;
            margin-top: 15px;
            color: #8B949E;
            font-size: 13px;
        }

        .admin-info {
            color: #8B949E;
            font-size: 13px;
        }

        /* NOVO: Botões admin escondidos no canto inferior */
        .hidden-admin-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
        }

        .admin-hidden-btn {
            background: rgba(28, 33, 40, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.3);
            color: rgba(139, 148, 158, 0.5);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            text-align: right;
        }

        .admin-hidden-btn:hover {
            background: rgba(28, 33, 40, 0.8);
            border-color: rgba(212, 175, 55, 0.5);
            color: rgba(212, 175, 55, 0.8);
        }

        .admin-hidden-btn i {
            margin-right: 6px;
        }

        /* Modal de Admin (Login/Registro) */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-modal-content {
            background: #1C2128;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #30363D;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .admin-modal-content h3 {
            color: #D4AF37;
            margin-bottom: 20px;
            font-size: 18px;
            text-align: center;
        }

        .admin-modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .admin-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .admin-modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #D4AF37;
            color: #0D1117;
        }

        .btn-secondary {
            background: #30363D;
            color: white;
        }

        /* Removendo tabs de admin da tela principal */
        #loginScreen .tabs {
            display: none;
        }
    </style>
</head>
<body>

<!-- Tela de Login (Apenas Cliente) -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1><i class="fas fa-cut"></i> <span id="businessName">Barbearia</span></h1>
        
        <!-- Área Cliente (Principal) -->
        <div id="clientArea">
            <div class="tabs" style="display: flex; margin-top: 0;">
                <div class="tab active" onclick="switchClientTab('login')">Login</div>
                <div class="tab" onclick="switchClientTab('register')">Cadastro</div>
            </div>
            
            <div id="clientLogin">
                <input type="text" id="loginName" placeholder="Nome completo" autocomplete="name">
                <input type="tel" id="loginWhatsapp" placeholder="WhatsApp (11999998888)" autocomplete="tel">
                <button onclick="clientLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            </div>
            
            <div id="clientRegister" style="display:none;">
                <input type="text" id="regName" placeholder="Nome completo" autocomplete="name">
                <input type="tel" id="regWhatsapp" placeholder="WhatsApp (11999998888)" autocomplete="tel">
                <button onclick="clientRegister()"><i class="fas fa-user-plus"></i> Cadastrar</button>
            </div>
        </div>
        
        <div id="loginError" class="error-message"></div>
        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Sistema seguro
        </div>
    </div>
    
    <!-- NOVO: Botões Admin Escondidos -->
    <div class="hidden-admin-area">
        <button class="admin-hidden-btn" onclick="openAdminLoginModal()">
            <i class="fas fa-lock"></i> Acesso Admin
        </button>
        <button class="admin-hidden-btn" onclick="openAdminRegisterModal()">
            <i class="fas fa-cog"></i> Registrar Admin
        </button>
    </div>
</div>

<!-- Modal de Login Admin -->
<div id="adminLoginModal" class="admin-modal">
    <div class="admin-modal-content">
        <h3><i class="fas fa-lock"></i> Acesso Administrativo</h3>
        <input type="email" id="adminEmail" placeholder="Email do administrador" autocomplete="email">
        <input type="password" id="adminPassword" placeholder="Senha" autocomplete="current-password">
        <div id="adminLoginError" class="error-message" style="margin-bottom: 10px;"></div>
        <div class="admin-modal-actions">
            <button class="btn-primary" onclick="adminLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <button class="btn-secondary" onclick="closeAdminLoginModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Registro Admin -->
<div id="adminRegisterModal" class="admin-modal">
    <div class="admin-modal-content">
        <h3><i class="fas fa-user-plus"></i> Registrar Administrador</h3>
        <input type="email" id="newAdminEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="newAdminPassword" placeholder="Senha (mínimo 6 caracteres)">
        <input type="password" id="confirmAdminPassword" placeholder="Confirmar senha">
        <input type="password" id="adminSecretKey" placeholder="Chave secreta">
        <div id="adminRegisterError" class="error-message" style="margin-bottom: 10px;"></div>
        <div class="admin-modal-actions">
            <button class="btn-primary" onclick="adminRegister()"><i class="fas fa-check"></i> Registrar</button>
            <button class="btn-secondary" onclick="closeAdminRegisterModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Painel Admin -->
<div id="adminScreen" class="admin-screen">
    <div class="admin-container">
        <div class="admin-topbar">
            <h1><i class="fas fa-crown"></i> Painel Admin - <span id="adminBusinessName"></span></h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="adminUserEmail" class="admin-info"></span>
                <button onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <div class="label">Hoje</div>
                <div class="value" id="statToday">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="label">Clientes</div>
                <div class="value" id="statClients">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <div class="label">Mês</div>
                <div class="value" id="statRevenue">R$ 0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-scissors"></i>
                <div class="label">Serviços</div>
                <div class="value" id="statServices">0</div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="sidebar">
                <div class="sidebar-card">
                    <h3><i class="fas fa-calendar"></i> Dias de Funcionamento</h3>
                    <div id="workingDaysContainer" class="day-toggle"></div>
                </div>
                
                <div class="sidebar-card">
                    <h3><i class="fas fa-chart-line"></i> Limite Diário</h3>
                    <div class="limit-input">
                        <input type="number" id="dailyLimitInput" min="1" max="50" value="10">
                        <button onclick="updateDailyLimit()">Salvar</button>
                    </div>
                </div>
                
                <div class="sidebar-card">
                    <h3><i class="fas fa-list"></i> Serviços</h3>
                    <div id="servicesContainer" class="services-list"></div>
                    <button class="btn-add" onclick="addNewService()">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>
            </div>
            
            <div class="content-area">
                <div class="content-header">
                    <h2><i class="fas fa-list-ul"></i> Agendamentos</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="filterAppointments('all')">Todos</button>
                        <button class="filter-btn" onclick="filterAppointments('today')">Hoje</button>
                        <button class="filter-btn" onclick="filterAppointments('week')">Semana</button>
                    </div>
                </div>
                
                <div id="appointmentsContainer" class="appointments-table"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Detalhes -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-info-circle"></i> Detalhes do Agendamento</h3>
        <div id="modalDetails"></div>
        <div class="modal-actions">
            <button class="btn-delete" onclick="deleteFromModal()">
                <i class="fas fa-trash"></i> Excluir
            </button>
            <button class="btn-view" onclick="closeModal()">Fechar</button>
        </div>
    </div>
</div>

<script>
    "use strict";
    
    // ============================================
    // CONFIGURAÇÕES - ALTERE AQUI PARA CADA CLIENTE
    // ============================================
    const CONFIG = {
        BUSINESS_NAME: 'Barbearia Style',

    // Variáveis globais
    let currentFilter = 'all';

    // NOVO: Funções para modais admin
    function openAdminLoginModal() {
        document.getElementById('adminLoginModal').classList.add('active');
        document.getElementById('adminLoginError').style.display = 'none';
    }
    
    function closeAdminLoginModal() {
        document.getElementById('adminLoginModal').classList.remove('active');
        document.getElementById('adminEmail').value = '';
        document.getElementById('adminPassword').value = '';
    }
    
    function openAdminRegisterModal() {

    function closeAdminRegisterModal() {
        document.getElementById('adminRegisterModal').classList.remove('active');

    function showAdminLoginError(message) {
        const el = document.getElementById('adminLoginError');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    
    function showAdminRegisterError(message) {
        const el = document.getElementById('adminRegisterError');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    
    // Funções de UI
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#F85149' : '#D4AF37';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showError(message) {
        const el = document.getElementById('loginError');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    
    function switchClientTab(tab) {
        const subtabs = document.querySelectorAll('#clientArea .tab');
        subtabs.forEach(t => t.classList.remove('active'));
        
        if(tab === 'login') {
            document.getElementById('clientLogin').style.display = 'block';
            document.getElementById('clientRegister').style.display = 'none';
            subtabs[0].classList.add('active');
        } else {
            document.getElementById('clientLogin').style.display = 'none';
            document.getElementById('clientRegister').style.display = 'block';
            subtabs[1].classList.add('active');
        }
    }
    
    // Validação de WhatsApp
    function validateWhatsapp(whatsapp) {
        const cleaned = whatsapp.replace(/\D/g, '');
        return cleaned.length >= 10 && cleaned.length <= 11;
    }
    
    // Funções Cliente
    async function clientRegister() {
        const name = document.getElementById('regName').value.trim();
        let whatsapp = document.getElementById('regWhatsapp').value.trim();
        const cleanedWhatsapp = whatsapp.replace(/\D/g, '');
        
        if(!name || !cleanedWhatsapp) {
            showError('Preencha todos os campos');
            return;
        }
        
        if(!validateWhatsapp(cleanedWhatsapp)) {
            showError('WhatsApp inválido. Use DDD + número');
            return;
        }
        
        try {
            // Verificar se já existe
            const existing = await db.collection('users')
                .where('whatsapp', '==', cleanedWhatsapp)
                .get();
            
            if(!existing.empty) {
                showError('WhatsApp já cadastrado! Faça login.');
                return;
            }
            
            await db.collection('users').add({
                name,
                whatsapp: cleanedWhatsapp,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showToast('Cadastro realizado com sucesso! Faça login.');
            document.getElementById('regName').value = '';
            document.getElementById('regWhatsapp').value = '';
            switchClientTab('login');
        } catch(error) {
            console.error('Erro no cadastro:', error);
            showError('Erro ao cadastrar: ' + error.message);
        }
    }
    
    async function clientLogin() {
        const name = document.getElementById('loginName').value.trim();
        let whatsapp = document.getElementById('loginWhatsapp').value.trim();
        const cleanedWhatsapp = whatsapp.replace(/\D/g, '');
        
        if(!name || !cleanedWhatsapp) {
            showError('Preencha todos os campos');
            return;
        }
        
        try {
            const snap = await db.collection('users')
                .where('name', '==', name)
                .where('whatsapp', '==', cleanedWhatsapp)
                .get();
            
            if(!snap.empty) {
                const user = snap.docs[0].data();
                showToast(`Bem-vindo(a), ${user.name}!`);
                document.getElementById('loginName').value = '';
                document.getElementById('loginWhatsapp').value = '';
                // Aqui você pode redirecionar para a página de agendamento
            } else {
                showError('Usuário não encontrado. Verifique os dados ou cadastre-se.');
            }
        } catch(error) {
            console.error('Erro no login:', error);
            showError('Erro ao fazer login: ' + error.message);
        }
    }
    
    // Funções Admin
    async function adminRegister() {
        const email = document.getElementById('newAdminEmail').value.trim();
        const password = document.getElementById('newAdminPassword').value;
        const confirm = document.getElementById('confirmAdminPassword').value;
        const secret = document.getElementById('adminSecretKey').value;
        
        if(!email || !password || !confirm || !secret) {
            showAdminRegisterError('Preencha todos os campos');
            return;
        }
        
        if(!email.includes('@') || !email.includes('.')) {
            showAdminRegisterError('Email inválido');
            return;
        }
        
        if(password !== confirm) {
            showAdminRegisterError('As senhas não coincidem');
            return;
        }
        
        if(password.length < 6) {
            showAdminRegisterError('A senha deve ter no mínimo 6 caracteres');
            return;
        }
        
        if(secret !== CONFIG.ADMIN_SECRET) {
            showAdminRegisterError('Chave secreta incorreta');
            return;
        }
        
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('admins').doc(cred.user.uid).set({
                email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showToast('Conta admin criada com sucesso!');
            closeAdminRegisterModal();
        } catch(error) {
            console.error('Erro no registro admin:', error);
            
            if(error.code === 'auth/email-already-in-use') {
                showAdminRegisterError('Este email já está em uso');
            } else if(error.code === 'auth/invalid-email') {
                showAdminRegisterError('Email inválido');
            } else if(error.code === 'auth/weak-password') {
                showAdminRegisterError('Senha muito fraca');
            } else {
                showAdminRegisterError('Erro: ' + error.message);
            }
        }
    }
    
    async function adminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        
        if(!email || !password) {
            showAdminLoginError('Preencha email e senha');
            return;
        }
        
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            
            // Verificar se é admin
            const adminDoc = await db.collection('admins').doc(cred.user.uid).get();
            
            if(!adminDoc.exists) {
                await auth.signOut();
                showAdminLoginError('Acesso negado. Esta conta não tem privilégios de administrador.');
                return;
            }
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').classList.add('active');
            document.getElementById('adminUserEmail').textContent = email;
            
            closeAdminLoginModal();
            await loadAdminData();
            showToast('Login realizado com sucesso!');
        } catch(error) {
            console.error('Erro no login admin:', error);
            
            if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                showAdminLoginError('Email ou senha incorretos');
            } else if(error.code === 'auth/invalid-email') {
                showAdminLoginError('Email inválido');
            } else {
                showAdminLoginError('Erro: ' + error.message);
            }
        }
    }
    
    async function adminLogout() {
        try {
            await auth.signOut();
            document.getElementById('adminScreen').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            showToast('Logout realizado com sucesso');
        } catch(error) {
            console.error('Erro no logout:', error);
            showToast('Erro ao fazer logout', true);
        }
    }
    
    // Monitorar estado de autenticação
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            try {
                const adminDoc = await db.collection('admins').doc(user.uid).get();
                if(adminDoc.exists) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminScreen').classList.add('active');
                    document.getElementById('adminUserEmail').textContent = user.email;
                    await loadAdminData();
                }
            } catch(error) {
                console.error('Erro ao verificar admin:', error);
            }
        }
    });
    
    // Carregar dados do painel
    async function loadAdminData() {
        try {
            await Promise.all([
                loadStats(),
                loadWorkingDays(),
                loadServices(),
                loadAppointments()
            ]);
        } catch(error) {
            console.error('Erro ao carregar dados:', error);
            showToast('Erro ao carregar alguns dados', true);
        }
    }
    
    async function loadStats() {
        try {
            const today = new Date().toISOString().split('T')[0];
            
            // Agendamentos de hoje
            const todayApps = await db.collection('appointments')
                .where('day', '==', today)
                .where('status', '==', 'confirmed')
                .get();
            document.getElementById('statToday').textContent = todayApps.size;
            
            // Total de clientes
            const users = await db.collection('users').get();
            document.getElementById('statClients').textContent = users.size;
            
            // Receita do mês
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const monthApps = await db.collection('appointments')
                .where('day', '>=', monthStart)
                .where('status', '==', 'confirmed')
                .get();
            
            let revenue = 0;
            monthApps.forEach(d => revenue += d.data().servicePrice || 0);
            document.getElementById('statRevenue').textContent = `R$ ${revenue.toFixed(2)}`;
            
            // Serviços ativos
            const services = await db.collection('services').where('active', '==', true).get();
            document.getElementById('statServices').textContent = services.size;
        } catch(error) {
            console.error('Erro ao carregar stats:', error);
        }
    }
    
    async function loadWorkingDays() {
        try {
            const snap = await db.collection('settings').doc('config').get();
            if(snap.exists) {
                workingDays = snap.data().workingDays || workingDays;
                document.getElementById('dailyLimitInput').value = snap.data().dailyLimit || 10;
            }
            renderWorkingDays();
        } catch(error) {
            console.error('Erro ao carregar dias:', error);
        }
    }
    
    function renderWorkingDays() {
        const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const html = Object.keys(workingDays).map(d => {
            const day = parseInt(d);
            return `<div class="day-btn ${workingDays[day] ? 'active' : ''}" onclick="toggleWorkingDay(${day})">${days[day]}</div>`;
        }).join('');
        document.getElementById('workingDaysContainer').innerHTML = html;
    }
    
    async function toggleWorkingDay(day) {
        try {
            workingDays[day] = !workingDays[day];
            await db.collection('settings').doc('config').set({ workingDays }, { merge: true });
            renderWorkingDays();
            showToast(`Dia ${workingDays[day] ? 'ativado' : 'desativado'}`);
        } catch(error) {
            console.error('Erro ao alternar dia:', error);
            showToast('Erro ao salvar configuração', true);
        }
    }
    
    async function updateDailyLimit() {
        try {
            const limit = parseInt(document.getElementById('dailyLimitInput').value);
            if(limit < 1) throw new Error('Limite deve ser maior que zero');
            
            await db.collection('settings').doc('config').set({ dailyLimit: limit }, { merge: true });
            showToast(`Limite diário: ${limit} agendamentos`);
        } catch(error) {
            console.error('Erro ao atualizar limite:', error);
            showToast('Erro ao salvar limite', true);
        }
    }
    
    async function loadServices() {
        try {
            const snap = await db.collection('services').orderBy('createdAt', 'desc').get();
            servicesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const container = document.getElementById('servicesContainer');
            
            if(servicesCache.length === 0) {
                container.innerHTML = '<p style="color:#8B949E; text-align:center;">Nenhum serviço cadastrado</p>';
                return;
            }
            
            container.innerHTML = servicesCache.map(s => `
                <div class="service-item">
                    <input type="text" id="name_${s.id}" value="${s.name || ''}" placeholder="Nome do serviço">
                    <input type="number" id="price_${s.id}" value="${s.price || 0}" placeholder="Preço R$" step="0.01" min="0">
                    <div class="service-actions">
                        <button class="btn-save" onclick="updateService('${s.id}')"><i class="fas fa-save"></i> Salvar</button>
                        <button class="btn-toggle ${!s.active ? 'inactive' : ''}" onclick="toggleService('${s.id}')">
                            <i class="fas fa-power-off"></i> ${s.active ? 'Ativo' : 'Inativo'}
                        </button>
                    </div>
                </div>
            `).join('');
        } catch(error) {
            console.error('Erro ao carregar serviços:', error);
        }
    }
    
    async function updateService(id) {
        try {
            const name = document.getElementById(`name_${id}`).value.trim();
            const price = parseFloat(document.getElementById(`price_${id}`).value) || 0;
            
            if(!name) {
                showToast('Nome do serviço é obrigatório', true);
                return;
            }
            
            await db.collection('services').doc(id).update({ name, price });
            showToast('Serviço atualizado com sucesso');
            await loadStats();
        } catch(error) {
            console.error('Erro ao atualizar serviço:', error);
            showToast('Erro ao atualizar serviço', true);
        }
    }
    
    async function toggleService(id) {
        try {
            const doc = await db.collection('services').doc(id).get();
            const currentActive = doc.data().active;
            await db.collection('services').doc(id).update({ active: !currentActive });
            await loadServices();
            await loadStats();
            showToast(`Serviço ${!currentActive ? 'ativado' : 'desativado'}`);
        } catch(error) {
            console.error('Erro ao alternar serviço:', error);
            showToast('Erro ao alterar status', true);
        }
    }
    
    async function addNewService() {
        try {
            await db.collection('services').add({
                name: 'Novo Serviço',
                price: 50,
                active: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await loadServices();
            await loadStats();
            showToast('Novo serviço adicionado');
        } catch(error) {
            console.error('Erro ao adicionar serviço:', error);
            showToast('Erro ao adicionar serviço', true);
        }
    }
    
    async function loadAppointments() {
        try {
            let query = db.collection('appointments').orderBy('timestamp', 'desc');
            
            if(currentFilter === 'today') {
                query = query.where('day', '==', new Date().toISOString().split('T')[0]);
            } else if(currentFilter === 'week') {
                const d = new Date();
                d.setDate(d.getDate() - d.getDay());
                query = query.where('day', '>=', d.toISOString().split('T')[0]);
            }
            
            const snap = await query.limit(100).get();
            const container = document.getElementById('appointmentsContainer');
            
            if(snap.empty) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <h3>Nenhum agendamento encontrado</h3>
                        <p>Os agendamentos aparecerão aqui</p>
                    </div>`;
                return;
            }
            
            let html = '';
            snap.forEach(doc => {
                const a = doc.data();
                const [y, m, d] = a.day.split('-');
                
                html += `
                    <div class="appointment-row">
                        <div class="appointment-time">
                            <div class="appointment-date">${d}/${m}/${y}</div>
                            <div class="appointment-hour">${a.hour}</div>
                            <span class="status-badge status-${a.status || 'confirmed'}">${a.status || 'confirmado'}</span>
                        </div>
                        <div class="appointment-info">
                            <div class="info-item"><i class="fas fa-user"></i> ${a.userName}</div>
                            <div class="info-item"><i class="fab fa-whatsapp"></i> ${a.userWhatsapp}</div>
                            <div class="info-item"><i class="fas fa-cut"></i> ${a.serviceName}</div>
                            <div class="info-item"><i class="fas fa-tag"></i> R$ ${(a.servicePrice || 0).toFixed(2)}</div>
                        </div>
                        <div class="appointment-actions">
                            <button class="btn-view" onclick="viewDetails('${doc.id}')"><i class="fas fa-eye"></i> Detalhes</button>
                            <button class="btn-delete" onclick="deleteAppointment('${doc.id}')"><i class="fas fa-trash"></i> Excluir</button>
                        </div>
                    </div>`;
            });
            
            container.innerHTML = html;
        } catch(error) {
            console.error('Erro ao carregar agendamentos:', error);
            showToast('Erro ao carregar agendamentos', true);
        }
    }
    
    function filterAppointments(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        loadAppointments();
    }
    
    async function viewDetails(id) {
        try {
            const doc = await db.collection('appointments').doc(id).get();
            if(!doc.exists) {
                showToast('Agendamento não encontrado', true);
                return;
            }
            
            const a = doc.data();
            const [y, m, d] = a.day.split('-');
            currentAppointmentId = id;
            
            document.getElementById('modalDetails').innerHTML = `
                <div class="modal-detail"><i class="fas fa-user"></i> <strong>${a.userName}</strong></div>
                <div class="modal-detail"><i class="fab fa-whatsapp"></i> ${a.userWhatsapp}</div>
                <div class="modal-detail"><i class="fas fa-cut"></i> ${a.serviceName}</div>
                <div class="modal-detail"><i class="fas fa-tag"></i> R$ ${(a.servicePrice || 0).toFixed(2)}</div>
                <div class="modal-detail"><i class="fas fa-calendar"></i> ${d}/${m}/${y} às ${a.hour}</div>
                <div class="modal-detail"><i class="fas fa-clock"></i> Agendado em: ${new Date(a.timestamp).toLocaleString('pt-BR')}</div>
                <div class="modal-detail"><i class="fas fa-info-circle"></i> Status: ${a.status || 'Confirmado'}</div>`;
            
            document.getElementById('detailModal').classList.add('active');
        } catch(error) {
            console.error('Erro ao visualizar detalhes:', error);
            showToast('Erro ao carregar detalhes', true);
        }
    }
    
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
        currentAppointmentId = null;
    }
    
    async function deleteAppointment(id) {
        if(!confirm('Tem certeza que deseja excluir este agendamento?')) return;
        
        try {
            await db.collection('appointments').doc(id).delete();
            showToast('Agendamento excluído com sucesso');
            await loadAppointments();
            await loadStats();
        } catch(error) {
            console.error('Erro ao excluir:', error);
            showToast('Erro ao excluir agendamento', true);
        }
    }
    
    async function deleteFromModal() {
        if(!currentAppointmentId) return;
        
        if(!confirm('Tem certeza que deseja excluir este agendamento?')) return;
        
        try {
            await db.collection('appointments').doc(currentAppointmentId).delete();
            closeModal();
            showToast('Agendamento excluído com sucesso');
            await loadAppointments();
            await loadStats();
        } catch(error) {
            console.error('Erro ao excluir:', error);
            showToast('Erro ao excluir agendamento', true);
        }
    }
    
    // Inicializar dados padrão
    (async function init() {
        try {
            // Serviços padrão
            const sSnap = await db.collection('services').limit(1).get();
            if(sSnap.empty) {
                await db.collection('services').add({ 
                    name: 'Corte', 
                    price: 40, 
                    active: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('services').add({ 
                    name: 'Barba', 
                    price: 30, 
                    active: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('services').add({ 
                    name: 'Combo', 
                    price: 60, 
                    active: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            // Configurações padrão
            const cfgSnap = await db.collection('settings').doc('config').get();
            if(!cfgSnap.exists) {
                await db.collection('settings').doc('config').set({
                    workingDays: {0: false, 1: true, 2: true, 3: true, 4: true, 5: true, 6: false},
                    dailyLimit: 10,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            console.log('Sistema inicializado com sucesso');
        } catch(error) {
            console.error('Erro na inicialização:', error);

    // Fechar modal com ESC
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') {
            closeModal();
            closeAdminLoginModal();
            closeAdminRegisterModal();
        }
    });
    
    // Fechar modais ao clicar fora
    document.getElementById('detailModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('detailModal')) {
            closeModal();
        }
    });
    
    document.getElementById('adminLoginModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('adminLoginModal')) {
            closeAdminLoginModal();
        }
    });
    
    document.getElementById('adminRegisterModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('adminRegisterModal')) {
            closeAdminRegisterModal();
        }
    });
</script>
