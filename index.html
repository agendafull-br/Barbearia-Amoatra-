<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Agendamentos</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0D1117;
            color: #E6EDF3;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0D1117 0%, #1A1F2B 100%);
        }

        .login-box {
            background: #1C2128;
            padding: 30px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #30363D;
            margin: 20px;
        }

        .login-box h1 {
            color: #D4AF37;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            background: #C4A030;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #8B949E;
            border: 1px solid #30363D;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }

        .tab.active {
            background: #D4AF37;
            color: #0D1117;
            border-color: #D4AF37;
        }

        .admin-screen {
            display: none;
            min-height: 100vh;
            padding: 15px;
        }

        .admin-screen.active {
            display: block;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-topbar {
            background: #1C2128;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363D;
            gap: 15px;
        }

        .admin-topbar h1 {
            color: #D4AF37;
            font-size: 20px;
        }

        .admin-topbar button {
            padding: 10px 20px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1C2128;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363D;
        }

        .stat-card i {
            font-size: 24px;
            color: #D4AF37;
            margin-bottom: 8px;
        }

        .stat-card .label {
            color: #8B949E;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-card {
            background: #1C2128;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363D;
        }

        .sidebar-card h3 {
            color: #D4AF37;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .day-toggle {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .day-btn {
            padding: 8px 3px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 6px;
            color: #8B949E;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            transition: all 0.3s;
        }

        .day-btn.active {
            background: #238636;
            color: white;
            border-color: #238636;
        }

        .limit-input {
            display: flex;
            gap: 10px;
        }

        .limit-input input {
            flex: 1;
            padding: 10px;
            background: #0D1117;
            border: 1px solid #30363D;
            border-radius: 8px;
            color: white;
        }

        .limit-input button {
            padding: 10px 15px;
            background: #D4AF37;
            color: #0D1117;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .services-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .service-item {
            background: #0D1117;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #30363D;
        }

        .service-item input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #1C2128;
            border: 1px solid #30363D;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .service-actions {
            display: flex;
            gap: 8px;
        }

        .service-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-save {
            background: #D4AF37;
            color: #0D1117;
        }

        .btn-toggle {
            background: #238636;
            color: white;
        }

        .btn-toggle.inactive {
            background: #6E7681;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .content-area {
            background: #1C2128;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363D;
        }

        .content-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .content-header h2 {
            color: #D4AF37;
            font-size: 18px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 12px;
            background: #0D1117;
            color: #8B949E;
            border: 1px solid #30363D;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #D4AF37;
            color: #0D1117;
            border-color: #D4AF37;
        }

        .appointments-table {
            width: 100%;
        }

        .appointment-row {
            background: #0D1117;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #30363D;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .appointment-row {
                grid-template-columns: 120px 1fr auto;
            }
        }

        .appointment-row:hover {
            border-color: #D4AF37;
            background: #161B22;
        }

        .appointment-time {
            text-align: center;
        }

        .appointment-date {
            font-size: 13px;
            color: #8B949E;
            margin-bottom: 5px;
        }

        .appointment-hour {
            font-size: 20px;
            font-weight: bold;
            color: #D4AF37;
        }

        .appointment-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .appointment-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .info-item i {
            color: #D4AF37;
            width: 18px;
        }

        .appointment-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-view {
            padding: 8px 15px;
            background: #1C2128;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #D4AF37;
            color: #0D1117;
        }

        .btn-delete {
            padding: 8px 15px;
            background: #DA3633;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #F85149;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }

        .status-confirmed {
            background: #238636;
            color: white;
        }

        .status-cancelled {
            background: #DA3633;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8B949E;
        }

        .empty-state i {
            font-size: 40px;
            color: #30363D;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1C2128;
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #30363D;
        }

        .modal-content h3 {
            color: #D4AF37;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal-detail {
            margin-bottom: 12px;
            padding: 10px;
            background: #0D1117;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1C2128;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            border-left: 4px solid #D4AF37;
            z-index: 2000;
            animation: slideUp 0.3s;
            font-size: 14px;
            max-width: 90%;
            text-align: center;
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }

        .error-message {
            color: #F85149;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .link-button {
            background: none;
            border: none;
            color: #D4AF37;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            width: 100%;
            font-size: 14px;
        }

        .info-text {
            text-align: center;
            margin-top: 15px;
            color: #8B949E;
            font-size: 13px;
        }

        .admin-info {
            color: #8B949E;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- Tela de Login -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1><i class="fas fa-cut"></i> <span id="businessName">Barbearia</span></h1>
        
        <div class="tabs">
            <div class="tab active" onclick="switchMainTab('client')">Cliente</div>
            <div class="tab" onclick="switchMainTab('admin')">Admin</div>
        </div>
        
        <!-- Área Cliente -->
        <div id="clientArea">
            <div class="tabs" style="margin-top: 15px;">
                <div class="tab active" onclick="switchClientTab('login')">Login</div>
                <div class="tab" onclick="switchClientTab('register')">Cadastro</div>
            </div>
            
            <div id="clientLogin">
                <input type="text" id="loginName" placeholder="Nome completo" autocomplete="name">
                <input type="tel" id="loginWhatsapp" placeholder="WhatsApp (11999998888)" autocomplete="tel">
                <button onclick="clientLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            </div>
            
            <div id="clientRegister" style="display:none;">
                <input type="text" id="regName" placeholder="Nome completo" autocomplete="name">
                <input type="tel" id="regWhatsapp" placeholder="WhatsApp (11999998888)" autocomplete="tel">
                <button onclick="clientRegister()"><i class="fas fa-user-plus"></i> Cadastrar</button>
            </div>
        </div>
        
        <!-- Área Admin -->
        <div id="adminArea" style="display:none;">
            <div id="adminLoginForm">
                <input type="email" id="adminEmail" placeholder="Email do administrador" autocomplete="email">
                <input type="password" id="adminPassword" placeholder="Senha" autocomplete="current-password">
                <button onclick="adminLogin()"><i class="fas fa-lock"></i> Acessar Painel</button>
                <button class="link-button" onclick="showAdminRegisterForm()">
                    <i class="fas fa-user-plus"></i> Criar conta admin
                </button>
            </div>
            
            <div id="adminRegisterForm" style="display:none;">
                <h3 style="color:#D4AF37; margin-bottom:15px; font-size:16px;">Registrar Admin</h3>
                <input type="email" id="newAdminEmail" placeholder="Email" autocomplete="email">
                <input type="password" id="newAdminPassword" placeholder="Senha (mínimo 6)">
                <input type="password" id="confirmAdminPassword" placeholder="Confirmar senha">
                <input type="password" id="adminSecretKey" placeholder="Chave secreta">
                <button onclick="adminRegister()"><i class="fas fa-check"></i> Criar Conta</button>
                <button class="link-button" onclick="backToAdminLogin()">
                    <i class="fas fa-arrow-left"></i> Voltar ao login
                </button>
            </div>
        </div>
        
        <div id="loginError" class="error-message"></div>
        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Sistema seguro
        </div>
    </div>
</div>

<!-- Painel Admin -->
<div id="adminScreen" class="admin-screen">
    <div class="admin-container">
        <div class="admin-topbar">
            <h1><i class="fas fa-crown"></i> Painel Admin - <span id="adminBusinessName"></span></h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="adminUserEmail" class="admin-info"></span>
                <button onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <div class="label">Hoje</div>
                <div class="value" id="statToday">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="label">Clientes</div>
                <div class="value" id="statClients">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <div class="label">Mês</div>
                <div class="value" id="statRevenue">R$ 0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-scissors"></i>
                <div class="label">Serviços</div>
                <div class="value" id="statServices">0</div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="sidebar">
                <div class="sidebar-card">
                    <h3><i class="fas fa-calendar"></i> Dias de Funcionamento</h3>
                    <div id="workingDaysContainer" class="day-toggle"></div>
                </div>
                
                <div class="sidebar-card">
                    <h3><i class="fas fa-chart-line"></i> Limite Diário</h3>
                    <div class="limit-input">
                        <input type="number" id="dailyLimitInput" min="1" max="50" value="10">
                        <button onclick="updateDailyLimit()">Salvar</button>
                    </div>
                </div>
                
                <div class="sidebar-card">
                    <h3><i class="fas fa-list"></i> Serviços</h3>
                    <div id="servicesContainer" class="services-list"></div>
                    <button class="btn-add" onclick="addNewService()">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>
            </div>
            
            <div class="content-area">
                <div class="content-header">
                    <h2><i class="fas fa-list-ul"></i> Agendamentos</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="filterAppointments('all')">Todos</button>
                        <button class="filter-btn" onclick="filterAppointments('today')">Hoje</button>
                        <button class="filter-btn" onclick="filterAppointments('week')">Semana</button>
                    </div>
                </div>
                
                <div id="appointmentsContainer" class="appointments-table"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Detalhes -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-info-circle"></i> Detalhes do Agendamento</h3>
        <div id="modalDetails"></div>
        <div class="modal-actions">
            <button class="btn-delete" onclick="deleteFromModal()">
                <i class="fas fa-trash"></i> Excluir
            </button>
            <button class="btn-view" onclick="closeModal()">Fechar</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // CONFIGURAÇÕES - ALTERE AQUI PARA CADA CLIENTE
    // ============================================
    const firebaseConfig = {
  apiKey: "AIzaSyC87oM5xbr6vUXT2aK-mMSUJRaXYihTGo4",
  authDomain: "barbearia-amoatra1.firebaseapp.com",
  projectId: "barbearia-amoatra1",
  storageBucket: "barbearia-amoatra1.firebasestorage.app",
  messagingSenderId: "562911302256",
  appId: "1:562911302256:web:4e43eb0a975258c7a09ab5"
};
    
    // Inicialização
    firebase.initializeApp(CONFIG.FIREBASE);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Aplicar nome do negócio
    document.getElementById('businessName').textContent = CONFIG.BUSINESS_NAME;
    document.getElementById('adminBusinessName').textContent = CONFIG.BUSINESS_NAME;
    document.title = CONFIG.BUSINESS_NAME + ' • Sistema';
    
    // Variáveis globais
    let currentFilter = 'all';
    let currentAppointmentId = null;
    let workingDays = {0: false, 1: true, 2: true, 3: true, 4: true, 5: true, 6: false};
    
    // Funções de UI
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#F85149' : '#D4AF37';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showError(message) {
        const el = document.getElementById('loginError');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    
    function switchMainTab(tab) {
        const tabs = document.querySelectorAll('#loginScreen .tabs:first-child .tab');
        tabs.forEach(t => t.classList.remove('active'));
        
        if(tab === 'client') {
            document.getElementById('clientArea').style.display = 'block';
            document.getElementById('adminArea').style.display = 'none';
            tabs[0].classList.add('active');
        } else {
            document.getElementById('clientArea').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            tabs[1].classList.add('active');
        }
        document.getElementById('loginError').style.display = 'none';
    }
    
    function switchClientTab(tab) {
        const subtabs = document.querySelectorAll('#clientArea .tab');
        subtabs.forEach(t => t.classList.remove('active'));
        
        if(tab === 'login') {
            document.getElementById('clientLogin').style.display = 'block';
            document.getElementById('clientRegister').style.display = 'none';
            subtabs[0].classList.add('active');
        } else {
            document.getElementById('clientLogin').style.display = 'none';
            document.getElementById('clientRegister').style.display = 'block';
            subtabs[1].classList.add('active');
        }
    }
    
    function showAdminRegisterForm() {
        document.getElementById('adminLoginForm').style.display = 'none';
        document.getElementById('adminRegisterForm').style.display = 'block';
        document.getElementById('loginError').style.display = 'none';
    }
    
    function backToAdminLogin() {
        document.getElementById('adminRegisterForm').style.display = 'none';
        document.getElementById('adminLoginForm').style.display = 'block';
        document.getElementById('loginError').style.display = 'none';
    }
    
    // Funções Cliente
    async function clientRegister() {
        const name = document.getElementById('regName').value.trim();
        let whatsapp = document.getElementById('regWhatsapp').value.trim();
        whatsapp = whatsapp.replace(/\D/g, '');
        
        if(!name || !whatsapp) {
            showError('Preencha todos os campos');
            return;
        }
        
        if(whatsapp.length < 10) {
            showError('WhatsApp inválido');
            return;
        }
        
        try {
            const existing = await db.collection('users')
                .where('whatsapp', '==', whatsapp)
                .get();
            
            if(!existing.empty) {
                showError('WhatsApp já cadastrado! Faça login.');
                return;
            }
            
            await db.collection('users').add({
                name, whatsapp,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showToast('Cadastro realizado! Faça login.');
            document.getElementById('regName').value = '';
            document.getElementById('regWhatsapp').value = '';
            switchClientTab('login');
        } catch(error) {
            showError('Erro: ' + error.message);
        }
    }
    
    async function clientLogin() {
        const name = document.getElementById('loginName').value.trim();
        let whatsapp = document.getElementById('loginWhatsapp').value.trim();
        whatsapp = whatsapp.replace(/\D/g, '');
        
        if(!name || !whatsapp) {
            showError('Preencha todos os campos');
            return;
        }
        
        try {
            const snap = await db.collection('users')
                .where('name', '==', name)
                .where('whatsapp', '==', whatsapp)
                .get();
            
            if(!snap.empty) {
                const user = snap.docs[0].data();
                showToast(`Bem-vindo, ${user.name}!`);
                // Redirecionar para agendamento (implementar depois)
                document.getElementById('loginName').value = '';
                document.getElementById('loginWhatsapp').value = '';
            } else {
                showError('Usuário não encontrado');
            }
        } catch(error) {
            showError('Erro: ' + error.message);
        }
    }
    
    // Funções Admin
    async function adminRegister() {
        const email = document.getElementById('newAdminEmail').value.trim();
        const password = document.getElementById('newAdminPassword').value;
        const confirm = document.getElementById('confirmAdminPassword').value;
        const secret = document.getElementById('adminSecretKey').value;
        
        if(!email || !password || !confirm || !secret) {
            showError('Preencha todos os campos');
            return;
        }
        
        if(password !== confirm) {
            showError('Senhas não coincidem');
            return;
        }
        
        if(password.length < 6) {
            showError('Senha deve ter 6+ caracteres');
            return;
        }
        
        if(secret !== CONFIG.ADMIN_SECRET) {
            showError('Chave secreta incorreta');
            return;
        }
        
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('admins').doc(cred.user.uid).set({
                email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showToast('Conta admin criada!');
            backToAdminLogin();
            
            document.getElementById('newAdminEmail').value = '';
            document.getElementById('newAdminPassword').value = '';
            document.getElementById('confirmAdminPassword').value = '';
            document.getElementById('adminSecretKey').value = '';
        } catch(error) {
            showError('Erro: ' + error.message);
        }
    }
    
    async function adminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        
        if(!email || !password) {
            showError('Preencha email e senha');
            return;
        }
        
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const adminDoc = await db.collection('admins').doc(cred.user.uid).get();
            
            if(!adminDoc.exists) {
                await auth.signOut();
                showError('Acesso negado');
                return;
            }
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').classList.add('active');
            document.getElementById('adminUserEmail').textContent = email;
            
            await loadAdminData();
            showToast('Login realizado!');
            
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
        } catch(error) {
            showError('Erro: ' + error.message);
        }
    }
    
    async function adminLogout() {
        await auth.signOut();
        document.getElementById('adminScreen').classList.remove('active');
        document.getElementById('loginScreen').style.display = 'flex';
        showToast('Logout realizado');
    }
    
    // Monitorar auth
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if(adminDoc.exists) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminScreen').classList.add('active');
                document.getElementById('adminUserEmail').textContent = user.email;
                await loadAdminData();
            }
        }
    });
    
    // Carregar dados do painel
    async function loadAdminData() {
        await loadStats();
        await loadWorkingDays();
        await loadServices();
        await loadAppointments();
    }
    
    async function loadStats() {
        const today = new Date().toISOString().split('T')[0];
        const todayApps = await db.collection('appointments')
            .where('day', '==', today).where('status', '==', 'confirmed').get();
        document.getElementById('statToday').textContent = todayApps.size;
        
        const users = await db.collection('users').get();
        document.getElementById('statClients').textContent = users.size;
        
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        const monthApps = await db.collection('appointments')
            .where('day', '>=', monthStart).where('status', '==', 'confirmed').get();
        
        let revenue = 0;
        monthApps.forEach(d => revenue += d.data().servicePrice || 0);
        document.getElementById('statRevenue').textContent = `R$ ${revenue.toFixed(2)}`;
        
        const services = await db.collection('services').where('active', '==', true).get();
        document.getElementById('statServices').textContent = services.size;
    }
    
    async function loadWorkingDays() {
        const snap = await db.collection('settings').doc('config').get();
        if(snap.exists) {
            workingDays = snap.data().workingDays || workingDays;
            document.getElementById('dailyLimitInput').value = snap.data().dailyLimit || 10;
        }
        renderWorkingDays();
    }
    
    function renderWorkingDays() {
        const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const html = Object.keys(workingDays).map(d => {
            const day = parseInt(d);
            return `<div class="day-btn ${workingDays[day] ? 'active' : ''}" onclick="toggleWorkingDay(${day})">${days[day]}</div>`;
        }).join('');
        document.getElementById('workingDaysContainer').innerHTML = html;
    }
    
    async function toggleWorkingDay(day) {
        workingDays[day] = !workingDays[day];
        await db.collection('settings').doc('config').set({ workingDays }, { merge: true });
        renderWorkingDays();
        showToast(`Dia ${workingDays[day] ? 'ativado' : 'desativado'}`);
    }
    
    async function updateDailyLimit() {
        const limit = parseInt(document.getElementById('dailyLimitInput').value);
        await db.collection('settings').doc('config').set({ dailyLimit: limit }, { merge: true });
        showToast(`Limite: ${limit} agendamentos/dia`);
    }
    
    async function loadServices() {
        const snap = await db.collection('services').get();
        const services = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const container = document.getElementById('servicesContainer');
        
        if(services.length === 0) {
            container.innerHTML = '<p style="color:#8B949E; text-align:center;">Nenhum serviço</p>';
            return;
        }
        
        container.innerHTML = services.map(s => `
            <div class="service-item">
                <input type="text" id="name_${s.id}" value="${s.name || ''}" placeholder="Nome">
                <input type="number" id="price_${s.id}" value="${s.price || 0}" placeholder="Preço" step="0.01">
                <div class="service-actions">
                    <button class="btn-save" onclick="updateService('${s.id}')"><i class="fas fa-save"></i></button>
                    <button class="btn-toggle ${!s.active ? 'inactive' : ''}" onclick="toggleService('${s.id}')">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }
    
    async function updateService(id) {
        const name = document.getElementById(`name_${id}`).value;
        const price = parseFloat(document.getElementById(`price_${id}`).value) || 0;
        await db.collection('services').doc(id).update({ name, price });
        showToast('Serviço atualizado');
        await loadStats();
    }
    
    async function toggleService(id) {
        const doc = await db.collection('services').doc(id).get();
        await db.collection('services').doc(id).update({ active: !doc.data().active });
        await loadServices();
        await loadStats();
    }
    
    async function addNewService() {
        await db.collection('services').add({
            name: 'Novo Serviço', price: 50, active: true,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await loadServices();
        await loadStats();
        showToast('Serviço adicionado');
    }
    
    async function loadAppointments() {
        let query = db.collection('appointments').orderBy('timestamp', 'desc');
        
        if(currentFilter === 'today') {
            query = query.where('day', '==', new Date().toISOString().split('T')[0]);
        } else if(currentFilter === 'week') {
            const d = new Date();
            d.setDate(d.getDate() - d.getDay());
            query = query.where('day', '>=', d.toISOString().split('T')[0]);
        }
        
        const snap = await query.limit(100).get();
        const container = document.getElementById('appointmentsContainer');
        
        if(snap.empty) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-times"></i>
                    <h3>Nenhum agendamento</h3>
                </div>`;
            return;
        }
        
        let html = '';
        snap.forEach(doc => {
            const a = doc.data();
            const [y, m, d] = a.day.split('-');
            
            html += `
                <div class="appointment-row">
                    <div class="appointment-time">
                        <div class="appointment-date">${d}/${m}/${y}</div>
                        <div class="appointment-hour">${a.hour}</div>
                        <span class="status-badge status-${a.status || 'confirmed'}">${a.status || 'confirmado'}</span>
                    </div>
                    <div class="appointment-info">
                        <div class="info-item"><i class="fas fa-user"></i> ${a.userName}</div>
                        <div class="info-item"><i class="fab fa-whatsapp"></i> ${a.userWhatsapp}</div>
                        <div class="info-item"><i class="fas fa-cut"></i> ${a.serviceName}</div>
                        <div class="info-item"><i class="fas fa-tag"></i> R$ ${(a.servicePrice || 0).toFixed(2)}</div>
                    </div>
                    <div class="appointment-actions">
                        <button class="btn-view" onclick="viewDetails('${doc.id}')"><i class="fas fa-eye"></i></button>
                        <button class="btn-delete" onclick="deleteAppointment('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        });
        
        container.innerHTML = html;
    }
    
    function filterAppointments(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        loadAppointments();
    }
    
    async function viewDetails(id) {
        const doc = await db.collection('appointments').doc(id).get();
        const a = doc.data();
        const [y, m, d] = a.day.split('-');
        currentAppointmentId = id;
        
        document.getElementById('modalDetails').innerHTML = `
            <div class="modal-detail"><i class="fas fa-user"></i> <strong>${a.userName}</strong></div>
            <div class="modal-detail"><i class="fab fa-whatsapp"></i> ${a.userWhatsapp}</div>
            <div class="modal-detail"><i class="fas fa-cut"></i> ${a.serviceName}</div>
            <div class="modal-detail"><i class="fas fa-tag"></i> R$ ${(a.servicePrice || 0).toFixed(2)}</div>
            <div class="modal-detail"><i class="fas fa-calendar"></i> ${d}/${m}/${y} às ${a.hour}</div>
            <div class="modal-detail"><i class="fas fa-clock"></i> ${new Date(a.timestamp).toLocaleString('pt-BR')}</div>`;
        
        document.getElementById('detailModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
        currentAppointmentId = null;
    }
    
    async function deleteAppointment(id) {
        if(!confirm('Excluir agendamento?')) return;
        await db.collection('appointments').doc(id).delete();
        showToast('Agendamento excluído');
        await loadAppointments();
        await loadStats();
    }
    
    async function deleteFromModal() {
        if(!currentAppointmentId) return;
        if(!confirm('Excluir este agendamento?')) return;
        await db.collection('appointments').doc(currentAppointmentId).delete();
        closeModal();
        showToast('Excluído com sucesso');
        await loadAppointments();
        await loadStats();
    }
    
    // Inicializar dados padrão
    (async function init() {
        const sSnap = await db.collection('services').limit(1).get();
        if(sSnap.empty) {
            await db.collection('services').add({ name: 'Corte', price: 40, active: true });
            await db.collection('services').add({ name: 'Barba', price: 30, active: true });
            await db.collection('services').add({ name: 'Combo', price: 60, active: true });
        }
        
        const cfgSnap = await db.collection('settings').doc('config').get();
        if(!cfgSnap.exists) {
            await db.collection('settings').doc('config').set({
                workingDays: {0: false, 1: true, 2: true, 3: true, 4: true, 5: true, 6: false},
                dailyLimit: 10
            });
        }
    })();
</script>
